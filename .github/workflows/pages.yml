name: Deploy web/ to GitHub Pages

# web/ 配下の静的サイト（LP index.html）を GitHub Pages に公開する。
# Actor の CI（ci.yml）とは独立。paths: web/** で絞ってあるので web/ 変更時のみ走る。
# 独自ドメインは Cloudflare Worker のリバースプロキシで当てるため web/CNAME は作らない。

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  workflow_dispatch:

# GitHub Pages デプロイに必要な権限（最小）
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1本に絞る（進行中のランを止めない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
